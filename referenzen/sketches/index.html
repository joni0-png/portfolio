<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketches — Portfolio</title>
	<link rel="icon" type="image/png" href="/animationen/animationen1/frame3.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
:root{
  --bg:#f5f4f0;--fg:#1a1a1a;--mid:#555;--dim:#e0deda;--accent:#1a1a1a;
  --RH:28px;--RW:28px;--NH:48px;
  --mono:'Helvetica Neue',Helvetica,Arial,sans-serif;
}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--mono);cursor:none}
#scroll-root{position:fixed;top:0;left:0;right:0;bottom:0;overflow-y:scroll;overflow-x:hidden;padding-top:28px;padding-left:28px}
#scroll-root::-webkit-scrollbar{width:2px}
#scroll-root::-webkit-scrollbar-track{background:var(--bg)}
#scroll-root::-webkit-scrollbar-thumb{background:var(--dim)}

nav{position:sticky;top:0;height:var(--NH);z-index:1800;display:flex;justify-content:space-between;align-items:center;padding:0 32px;margin-left:-28px;padding-left:60px;background:rgba(245,244,240,0.95);backdrop-filter:blur(12px)}
.nav-back{display:flex;align-items:center;gap:20px;text-decoration:none;color:var(--fg);font-size:8px;letter-spacing:.2em;text-transform:uppercase;transition:opacity .2s}
.nav-back:hover{opacity:.4}
.nav-project{font-size:8px;letter-spacing:.2em;color:var(--mid);text-transform:uppercase}
.nav-nr{opacity:.4;margin-right:10px}
.nav-meta{font-size:8px;color:var(--mid);letter-spacing:.1em}
#wrap{min-height:100%;padding:0}

/* ── PAGE HEADER ── */
.page-header{padding:48px 52px 40px 52px;}
.proj-nr{font-size:7px;letter-spacing:.28em;color:#aaa;margin-bottom:16px;text-transform:uppercase}
.proj-title{font-size:clamp(20px,2.5vw,34px);font-weight:300;letter-spacing:-.02em;line-height:1.2;color:var(--fg);margin:0 0 12px}
.proj-subtitle{font-size:10px;letter-spacing:.1em;color:var(--mid);margin:0}

/* ── VIEWER LAYOUT: left info | center image | right thumbs ── */
.viewer{
  display:grid;
  grid-template-columns:220px 1fr 152px;
  height:calc(100vh - var(--NH) - 140px);
  min-height:480px;
}

/* LEFT */
.info-panel{
  padding:40px 28px 40px 52px;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.info-index{font-size:7px;letter-spacing:.28em;color:#aaa;text-transform:uppercase;margin-bottom:20px}
.info-caption{font-size:13px;font-weight:300;letter-spacing:-.01em;color:var(--fg);margin:0 0 16px;line-height:1.4}
.info-desc{font-size:9px;line-height:2.1;color:var(--mid);letter-spacing:.04em;flex:1;overflow:hidden}
.info-nav{padding-top:28px;display:flex;flex-direction:column;gap:8px}
.info-nav button{
  background:none;border:none;cursor:none;
  font-size:7px;letter-spacing:.2em;color:var(--fg);opacity:.45;
  padding:0;font-family:var(--mono);text-transform:uppercase;
  text-align:left;transition:opacity .2s;
}
.info-nav button:hover{opacity:1}
.info-counter{font-size:7px;letter-spacing:.15em;color:#aaa;padding-top:4px}

/* CENTER */
.main-stage{
  overflow:hidden;background:#eeecea;
  display:flex;align-items:center;justify-content:center;
}
.main-stage img{
  width:100%;height:100%;object-fit:contain;display:block;
  transition:opacity .2s;
}
.main-stage img.fade{opacity:0}

/* RIGHT */
.thumb-panel{
  overflow-y:auto;
  padding:10px 10px;
  display:flex;flex-direction:column;gap:7px;
}
.thumb-panel::-webkit-scrollbar{width:2px}
.thumb-panel::-webkit-scrollbar-track{background:var(--bg)}
.thumb-panel::-webkit-scrollbar-thumb{background:var(--dim)}

.thumb{
  width:100%;aspect-ratio:4/3;overflow:hidden;
  background:#e8e6e2;cursor:none;flex-shrink:0;
  opacity:.5;
  transition:opacity .15s;
}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.thumb:hover{opacity:.8}
.thumb.active{opacity:1;}

/* ── SPLIT FOOTER ── */
.split-footer{
  display:grid;grid-template-columns:1fr 1fr;
  height:650px;margin-top:60px;
  width:calc(100% + 28px);margin-left:-28px;
  overflow:hidden;
}
.split-half{position:relative;background:#1a1a1a;overflow:hidden;cursor:none;text-decoration:none;display:block;pointer-events:all !important;z-index:1;}
.vticker-track{position:absolute;left:0;right:0;display:flex;flex-direction:column;align-items:center;will-change:transform;pointer-events:none !important;}
.vticker-track img{display:block;width:90%;height:auto;padding:40px 0;margin:0 auto;user-select:none;pointer-events:none;opacity:0.92;flex-shrink:0;}
.split-hover-label{position:absolute;bottom:28px;font-size:7px;letter-spacing:.22em;color:rgba(255,255,255,0);text-transform:uppercase;font-family:'IBM Plex Mono',monospace;pointer-events:none;transition:color .25s;white-space:nowrap;}
.split-half.split-last .split-hover-label{left:28px;}
.split-half.split-next .split-hover-label{right:28px;}
.split-half.hovered .split-hover-label{color:rgba(255,255,255,0.65);}
.split-half.hovered .vticker-track img{opacity:1;}

#ruler-canvas{position:fixed;top:0;left:0;pointer-events:none;z-index:2000}
#cx,#cy{position:fixed;pointer-events:none;z-index:9999;background:var(--accent);opacity:.5}
#cx{height:1px;width:100vw;top:0;left:0}
#cy{width:1px;height:100vh;left:0;top:0}
#cdot{position:fixed;width:4px;height:4px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:10000;transform:translate(-50%,-50%)}
#crx{position:fixed;top:0;width:1px;height:28px;background:var(--accent);opacity:.8;pointer-events:none;z-index:2001}
#cry{position:fixed;left:0;height:1px;width:28px;background:var(--accent);opacity:.8;pointer-events:none;z-index:2001}
#coords{position:fixed;bottom:14px;left:38px;font-size:8px;letter-spacing:.12em;color:var(--accent);opacity:.7;z-index:9000;pointer-events:none}
#loader{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s,visibility .5s}
#loader.hidden{opacity:0;visibility:hidden}
.l-pct{font-size:8px;letter-spacing:.4em;color:var(--accent)}
.l-track{width:180px;height:1px;background:var(--dim);position:relative}
.l-fill{position:absolute;left:0;top:0;height:100%;width:0;background:var(--accent);transition:width .08s linear}
</style>
</head>
<body>

<div id="loader">
  <div class="l-pct" id="lpct">000%</div>
  <div class="l-track"><div class="l-fill" id="lfill"></div></div>
</div>

<div id="cx"></div><div id="cy"></div><div id="cdot"></div>
<div id="crx"></div><div id="cry"></div>
<div id="coords">X: 0.0 cm / Y: 0.0 cm</div>
<canvas id="ruler-canvas"></canvas>

<div id="scroll-root">
  <div id="wrap">

    <nav>
      <a href="../../index.html" class="nav-back"><span>BACK</span></a>
      <div class="nav-project"><span class="nav-nr">06</span>Sonstiges</div>
      <div class="nav-meta" id="nav-time">00:00:00</div>
    </nav>

    <div class="page-header">
      <div class="proj-nr">Fotographie</div>
      <h1 class="proj-title"></h1>
      <p class="proj-subtitle">Analoge Darstellungen</p>
    </div>

    <div class="viewer">

      <div class="info-panel">
        <div class="info-index" id="info-index">01 / 16</div>
        <div class="info-caption" id="info-caption"></div>
        <div class="info-desc" id="info-desc"></div>
        <div class="info-nav">
          <button id="btn-prev">← Zurück</button>
          <button id="btn-next">Weiter →</button>
          <div class="info-counter" id="info-counter"></div>
        </div>
      </div>

      <div class="main-stage">
        <img id="main-img" src="" alt="">
      </div>

      <div class="thumb-panel" id="thumb-panel"></div>

    </div>

    <div class="split-footer">
      <a href="../Village_Sarabhai/index.html" class="split-half split-last">
        <div class="vticker-track" id="vtick-last"></div>
        <div class="split-hover-label">← Village_Sarabhai</div>
      </a>
      <a href="../Piano_Player/index.html" class="split-half split-next">
        <div class="vticker-track" id="vtick-next"></div>
        <div class="split-hover-label">Piano_Player →</div>
      </a>
    </div>

  </div>
</div>

<script>
/* LOADER */
(function(){
  var loader=document.getElementById('loader'),fill=document.getElementById('lfill'),lbl=document.getElementById('lpct'),p=0;
  var iv=setInterval(function(){p=Math.min(p+Math.random()*15,100);var f=Math.floor(p);fill.style.width=f+'%';lbl.textContent=String(f).padStart(3,'0')+'%';if(p>=100){clearInterval(iv);setTimeout(function(){loader.classList.add('hidden');},300);}},55);
})();

/* ── SLIDES ── */
var slides=[
  {img:'../../sketch/DSCF1279.jpeg',  caption:'Foto_01', desc:'Die Fotoreihe zur Le Corbusier Villa in der Weißenhofsiedlung untersucht die architektonische Klarheit und Strenge der Moderne. Unterschiedliche Blickwinkel und Lichtstimmungen rücken die charakteristischen Elemente der Architektur in den Vordergrund, wie die klaren Kubaturen sowie die horizontalen und vertikalen Linien. Die Bilder betonen die Reduktion auf Form, Material und Proportionen und machen die zeitlose Ästhetik der Villa erfahrbar, während sie zugleich die historische Bedeutung der Weißenhofsiedlung als Experimentierfeld der Moderne aufzeigen.'},
  {img:'../../sketch/DSCF1187.jpeg',  caption:'Foto_02', desc:'Die Fotoreihe zur Le Corbusier Villa in der Weißenhofsiedlung untersucht die architektonische Klarheit und Strenge der Moderne. Unterschiedliche Blickwinkel und Lichtstimmungen rücken die charakteristischen Elemente der Architektur in den Vordergrund, wie die klaren Kubaturen sowie die horizontalen und vertikalen Linien. Die Bilder betonen die Reduktion auf Form, Material und Proportionen und machen die zeitlose Ästhetik der Villa erfahrbar, während sie zugleich die historische Bedeutung der Weißenhofsiedlung als Experimentierfeld der Moderne aufzeigen.'},
  {img:'../../sketch/DSCF1191.jpeg',  caption:'Foto_03', desc:'Die Fotoreihe zur Le Corbusier Villa in der Weißenhofsiedlung untersucht die architektonische Klarheit und Strenge der Moderne. Unterschiedliche Blickwinkel und Lichtstimmungen rücken die charakteristischen Elemente der Architektur in den Vordergrund, wie die klaren Kubaturen sowie die horizontalen und vertikalen Linien. Die Bilder betonen die Reduktion auf Form, Material und Proportionen und machen die zeitlose Ästhetik der Villa erfahrbar, während sie zugleich die historische Bedeutung der Weißenhofsiedlung als Experimentierfeld der Moderne aufzeigen.'},
  {img:'../../sketch/DSCF1238.jpeg',  caption:'Foto_04', desc:'Die Fotoreihe zur Le Corbusier Villa in der Weißenhofsiedlung untersucht die architektonische Klarheit und Strenge der Moderne. Unterschiedliche Blickwinkel und Lichtstimmungen rücken die charakteristischen Elemente der Architektur in den Vordergrund, wie die klaren Kubaturen sowie die horizontalen und vertikalen Linien. Die Bilder betonen die Reduktion auf Form, Material und Proportionen und machen die zeitlose Ästhetik der Villa erfahrbar, während sie zugleich die historische Bedeutung der Weißenhofsiedlung als Experimentierfeld der Moderne aufzeigen.'},
  {img:'../../sketch/DSCF1178.jpeg',  caption:'Foto_05', desc:'Die Fotoreihe zur Le Corbusier Villa in der Weißenhofsiedlung untersucht die architektonische Klarheit und Strenge der Moderne. Unterschiedliche Blickwinkel und Lichtstimmungen rücken die charakteristischen Elemente der Architektur in den Vordergrund, wie die klaren Kubaturen sowie die horizontalen und vertikalen Linien. Die Bilder betonen die Reduktion auf Form, Material und Proportionen und machen die zeitlose Ästhetik der Villa erfahrbar, während sie zugleich die historische Bedeutung der Weißenhofsiedlung als Experimentierfeld der Moderne aufzeigen.'},
  {img:'../../sketch/IMG_0828.jpeg',   caption:'Foto_06', desc:'Die Fotografien zeigen nächtliche Situationen in London und im Barbican, in denen künstliches Licht den Stadtraum prägt. Straßenlaternen, Fenster und Reflexionen strukturieren die Dunkelheit und formen neue räumliche Wahrnehmungen. Besonders im Barbican entsteht durch das Zusammenspiel aus Betonarchitektur und punktuellen Lichtquellen eine dichte, atmosphärische Stimmung. Die Bilder untersuchen, wie Licht in der Nacht nicht nur Sichtbarkeit schafft, sondern selbst zu einem gestaltenden Element der Stadt wird.'},
  {img:'../../sketch/DSCF3227.jpeg',   caption:'Foto_07', desc:'Die Fotografien zeigen nächtliche Situationen in London und im Barbican, in denen künstliches Licht den Stadtraum prägt. Straßenlaternen, Fenster und Reflexionen strukturieren die Dunkelheit und formen neue räumliche Wahrnehmungen. Besonders im Barbican entsteht durch das Zusammenspiel aus Betonarchitektur und punktuellen Lichtquellen eine dichte, atmosphärische Stimmung. Die Bilder untersuchen, wie Licht in der Nacht nicht nur Sichtbarkeit schafft, sondern selbst zu einem gestaltenden Element der Stadt wird.'},
  {img:'../../sketch/komorebi03.jpg',   caption:'Foto_08', desc:'Die fotografische Arbeit untersucht das Lichtphänomen der Komorebi aus einer experimentellen Perspektive. Durch das Filmen in die Baumkronen wird das einfallende Sonnenlicht eingefangen, das durch die Blätter gefiltert wird und sich als weiche, runde Lichtpunkte abzeichnet. In der Schwarz Weiß Darstellung treten diese Lichtformen besonders deutlich hervor und lösen sich teilweise von ihrer konkreten Umgebung. So entsteht eine abstrakte Bildwelt, in der sich das Zusammenspiel von Licht, Bewegung und natürlicher Struktur auf eine reduzierte, atmosphärische Weise zeigt.'},
  
];

var cur=0;
var mainImg=document.getElementById('main-img');
var thumbPanel=document.getElementById('thumb-panel');

/* build thumbs */
slides.forEach(function(s,i){
  var d=document.createElement('div');d.className='thumb';d.dataset.i=i;
  var im=document.createElement('img');im.src=s.img;im.alt=s.caption;im.loading='lazy';
  d.appendChild(im);
  d.addEventListener('click',function(){goTo(i);});
  thumbPanel.appendChild(d);
});

function goTo(i){
  cur=(i+slides.length)%slides.length;
  var s=slides[cur];
  mainImg.classList.add('fade');
  setTimeout(function(){
    mainImg.src=s.img;
    mainImg.onload=function(){mainImg.classList.remove('fade');};
    mainImg.onerror=function(){mainImg.classList.remove('fade');};
  },180);
  document.getElementById('info-index').textContent=String(cur+1).padStart(2,'0')+' / '+slides.length;
  document.getElementById('info-caption').textContent=s.caption;
  document.getElementById('info-desc').textContent=s.desc;
  thumbPanel.querySelectorAll('.thumb').forEach(function(t){t.classList.toggle('active',parseInt(t.dataset.i)===cur);});
  var active=thumbPanel.querySelector('.thumb.active');
  if(active)active.scrollIntoView({block:'nearest',behavior:'smooth'});
}

document.getElementById('btn-prev').addEventListener('click',function(){goTo(cur-1);});
document.getElementById('btn-next').addEventListener('click',function(){goTo(cur+1);});
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown')goTo(cur+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')goTo(cur-1);
});
goTo(0);

/* LINEALE */
var RH=28,RW=28,scrollRoot=document.getElementById('scroll-root');
var cmProbe=document.createElement('div');
cmProbe.style.cssText='position:fixed;width:1cm;height:1px;visibility:hidden;pointer-events:none;top:0;left:0;';
document.body.appendChild(cmProbe);
function getPxPerCm(){return cmProbe.getBoundingClientRect().width;}
var $cx=document.getElementById('cx'),$cy=document.getElementById('cy'),$dot=document.getElementById('cdot'),$co=document.getElementById('coords'),$crx=document.getElementById('crx'),$cry=document.getElementById('cry');
document.addEventListener('mousemove',function(e){var x=e.clientX,y=e.clientY;$cx.style.top=y+'px';$cy.style.left=x+'px';$dot.style.left=x+'px';$dot.style.top=y+'px';$crx.style.left=x+'px';$cry.style.top=y+'px';var ppc=getPxPerCm();$co.textContent='X: '+((x-RW+scrollRoot.scrollLeft)/ppc).toFixed(1)+' cm  /  Y: '+((y-RH+scrollRoot.scrollTop)/ppc).toFixed(1)+' cm';});
function redrawRulers(){var cv=document.getElementById('ruler-canvas');var dpr=window.devicePixelRatio||1,ppc=getPxPerCm();var vv=window.visualViewport,W=vv?vv.width:window.innerWidth,H=vv?vv.height:window.innerHeight;cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);cv.style.width=W+'px';cv.style.height=H+'px';var c=cv.getContext('2d');c.scale(dpr,dpr);c.clearRect(0,0,W,H);var scrollX=scrollRoot.scrollLeft/ppc,scrollY=scrollRoot.scrollTop/ppc;c.fillStyle='#f5f4f0';c.fillRect(0,0,RW,RH);c.strokeStyle='#e0deda';c.lineWidth=1;c.beginPath();c.moveTo(RW-.5,0);c.lineTo(RW-.5,RH);c.stroke();c.beginPath();c.moveTo(0,RH-.5);c.lineTo(RW,RH-.5);c.stroke();c.fillStyle='#1a1a1a';c.font='7px "IBM Plex Mono",monospace';c.textAlign='center';c.textBaseline='middle';c.fillText('cm',RW/2,RH/2);c.fillStyle='#f5f4f0';c.fillRect(RW,0,W-RW,RH);c.strokeStyle='#e0deda';c.beginPath();c.moveTo(RW,RH-.5);c.lineTo(W,RH-.5);c.stroke();c.font='7px "IBM Plex Mono",monospace';c.textAlign='left';c.textBaseline='bottom';for(var mm=Math.floor(scrollX*10);;mm++){var x=RW+(mm/10-scrollX)*ppc;if(x>W+1)break;if(x<RW)continue;var isCm=(mm%10===0),is5=(mm%5===0),th=isCm?14:is5?9:5;c.fillStyle=isCm?'#999':'#ccc';c.fillRect(Math.round(x),RH-th,1,th);if(isCm&&x>RW+2){c.fillStyle='#888';c.fillText(Math.round(mm/10)+'',x+2,RH-15);}}c.fillStyle='#f5f4f0';c.fillRect(0,RH,RW,H-RH);c.strokeStyle='#e0deda';c.beginPath();c.moveTo(RW-.5,RH);c.lineTo(RW-.5,H);c.stroke();c.font='7px "IBM Plex Mono",monospace';for(var mm2=Math.floor(scrollY*10);;mm2++){var y=RH+(mm2/10-scrollY)*ppc;if(y>H+1)break;if(y<RH)continue;var isCm2=(mm2%10===0),is52=(mm2%5===0),tw=isCm2?14:is52?9:5;c.fillStyle=isCm2?'#999':'#ccc';c.fillRect(RW-tw,Math.round(y),tw,1);if(isCm2&&y>RH+2){c.save();c.translate(RW-15,y-2);c.rotate(-Math.PI/2);c.fillStyle='#888';c.textAlign='left';c.textBaseline='alphabetic';c.fillText(Math.round(mm2/10)+'',0,0);c.restore();}}}
scrollRoot.addEventListener('scroll',redrawRulers,{passive:true});
window.addEventListener('resize',redrawRulers);
if(window.visualViewport){window.visualViewport.addEventListener('resize',redrawRulers);window.visualViewport.addEventListener('scroll',redrawRulers);}
new ResizeObserver(redrawRulers).observe(document.documentElement);
function tick(){var t=new Date(),pad=function(n){return String(n).padStart(2,'0');};document.getElementById('nav-time').textContent=pad(t.getHours())+':'+pad(t.getMinutes())+':'+pad(t.getSeconds());}
setInterval(tick,1000);tick();
redrawRulers();

/* SPLIT FOOTER */
(function(){
  var LAST_IMG='../../Last.png',NEXT_IMG='../../Next.png',HEIGHT=650,SPEED=120;
  function buildTicker(trackEl,imgSrc,direction){var pos=0,last=null;var seed=new Image();seed.src=imgSrc;seed.draggable=false;seed.style.cssText='display:block;width:90%;height:auto;padding:40px 0;margin:0 auto;user-select:none;pointer-events:none;opacity:0.92;flex-shrink:0;';trackEl.appendChild(seed);function start(){var seedH=seed.offsetHeight;if(seedH===0){setTimeout(start,50);return;}var needed=Math.ceil((HEIGHT*3)/seedH)+3;for(var i=0;i<needed;i++){var cl=new Image();cl.src=imgSrc;cl.draggable=false;cl.style.cssText=seed.style.cssText;trackEl.appendChild(cl);}var totalH=(needed+1)*seedH;pos=(direction===1)?-(totalH-HEIGHT):0;function loop(ts){if(last===null)last=ts;var dt=(ts-last)/1000;last=ts;if(direction===-1){pos-=SPEED*dt;if(pos<=-totalH)pos+=totalH;}else{pos+=SPEED*dt;if(pos>=0)pos-=totalH;}trackEl.style.transform='translateY('+pos+'px)';requestAnimationFrame(loop);}requestAnimationFrame(loop);}if(seed.complete&&seed.naturalHeight>0){start();}else{seed.onload=start;}}
  buildTicker(document.getElementById('vtick-last'),LAST_IMG,-1);
  buildTicker(document.getElementById('vtick-next'),NEXT_IMG,1);
  document.querySelectorAll('.split-half').forEach(function(h){h.addEventListener('mouseenter',function(){h.classList.add('hovered');});h.addEventListener('mouseleave',function(){h.classList.remove('hovered');});});
})();
</script>
</body>
